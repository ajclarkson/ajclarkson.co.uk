<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
		<title>{% if page.title %} {{page.title | strip_html}} | {% endif %}{{site.name }}</title>
		<meta name="viewport" content="initial-scale=1" />

		<meta property="og:title" content="{{ page.title | strip_html }}"/>
		<meta property="og:site_name" content="{{ site.name }}"/>
		<meta property="og:url" content="{{ page.url }}"/>
		<meta property="og:description" content="{{ page.excerpt | strip_html }}"/>

		{% stylesheet site %}
		<link rel="stylesheet" type="text/css" href="/static/slick/slick.css"/>

		<!-- Typekit -->
		<script src="//use.typekit.net/ahk4squ.js"></script>
		<script>try{Typekit.load();}catch(e){}</script>
		<!-- RSS -->
		<link rel="alternate" type="application/rss+xml" title="RSS" href="/feed.xml" />
		
	</head>
	<body>
	<header id="site_header">
		<section id="header_content" class="wrap">
	
			<a href="/" id="identity" title="ajclarkson | Design &amp; Develop" >Adam<strong>Clarkson</strong></a>
	

		<ul id="nav">
			<li><a href="/projects">Projects</a></li>
			<li><a href="/blog">Blog</a></li>
			<li><a href="/about">About</a></li>
			<li class="js-dark-mode"><span>☼</span></li>
		</ul>
		</section>
	</header><!-- /header -->
	<section class="site_content" role="main">
		{{ content }}
	</section>
	<footer id="site_footer">
		<section id="footer_content" class="wrap">
			<ul class="social-icons">
				<li><a href="http://twitter.com/ajclarkson"><img src="/static/images/twitter.png" alt="@ajclarkson on twitter"/></a></li>
				<li><a href="http://instagram.com/ajclarkson"><img src="/static/images/instagram.png" alt="ajclarkson on instagram"/></a></li>
				<li><a href="http://dribbble.com/ajclarkson"><img src="/static/images/dribbble.png" alt="ajclarkson on dribbble"/></a></li>
				<li><a href="http://github.com/ajclarkson"><img src="/static/images/github.png" alt="ajclarkson on github"/></a></li>
				<li><a href="http://uk.linkedin.com/in/ajclarkson"><img src="/static/images/linkedin.png" alt="ajclarkson on linkedin"/></a></li>
				<li><a href="/feed.xml"><img src="/static/images/rss.png" alt="RSS Feed"/></a></li>
			</ul>
			<p>Handcrafted by <a href="/about">Adam Clarkson</a>, powered by Jekyll &amp; Git.<br />
				&copy; 2013&mdash;{{ 'now' | date: "%Y" }} All Rights Reserved.</p>
		</section><!-- /footer-content -->
	</footer><!-- /footer -->
	<script type="text/javascript" src="//code.jquery.com/jquery-1.11.0.min.js"></script>
	<script type="text/javascript" src="//code.jquery.com/jquery-migrate-1.2.1.min.js"></script>
	<script type="text/javascript" src="/static/slick/slick.min.js"></script>

	{% javascript app %}

	</body>
</html>
