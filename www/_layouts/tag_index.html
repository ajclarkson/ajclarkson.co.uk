---
layout: default
---

<article>
	<header id="masthead">
		<section id="masthead_content" class="wrap">
			<h1>{{page.title}}</h1>
			<p class="excerpt type-target"><span class="term"><strong>$></strong></span> <span class="type-target-tag"></p>
		</section>
	</header>

	<section class="content_block wrap">
		<ul>
		{% for post in site.posts %}
			{% for tag in post.tags %}
				{% if tag == page.tag %}

				<h3><a href="{{post.url}}">{{post.title}}</a></h3>
				<p><span class="meta">{{post.date | date_to_long_string}}</span></p>

				<p>{{ post.excerpt}}</p>
				<hr />

				{% endif %}
			{% endfor %}
		{% endfor %}
		</ul>
	</section><!-- /recent-articles -->

</article><!--/article.page-->
