---
layout: default
---
<article>
	{% if page.title %}
	<h1>{{ page.title }}</h1>
	{% endif %}
	{% if page.excerpt %}
	<p class="excerpt">{{ page.excerpt }}</p>
	{% endif %}
	<section class="content_block" >
		{{ content }}
	</section><!-- /post-content -->
</article><!-- /article.post -->
