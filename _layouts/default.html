<html>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
		<title>{% if page.title %} {{page.title}} | {% endif %}{{site.name }}</title>
		<meta name="viewport" content="width=device-width">
		<script type="text/javascript" src="/js/html5shiv.js"></script>
		<script type="text/javascript" src="/js/picturefill.js"></script>
		<link rel="stylesheet" href="/stylesheets/main.css">
		<link rel="stylesheet" href="/stylesheets/syntax.css">
		<script src="//use.typekit.net/ahk4squ.js"></script>
		<script>try{Typekit.load();}catch(e){}</script>
	</head>
	<body>
	<header id="site-header" class="clear">
		<section id="site-header-content" class="island clear">
			<div id="identity"><a href="/">Adam<strong>Clarkson</strong></a></div>
			<ul>
				<li id="blog_tile"><a href="/blog/">Blog</a></li>
				<li id="projects_tile"><a href="/projects/">Projects</a></li>
				<li id="about_tile"><a href="/about/">About</a></li>
			</ul>
		</section><!-- /site-header-content -->
	</header><!-- /header -->

	{{ content }}

	<footer class="clear">
		<section id="footer-content" class="island">
			<p>Handcrafted by <a href="/about">Adam Clarkson</a>, powered by Jekyll &amp; Git. To keep updated you might want to <a href="http://twitter.com/ajclarkson">follow me on twitter</a> or <a href="/atom.xml">subscribe to my RSS</a>. &copy; 2013&mdash;{{ 'now' | date: "%Y" }}</p>
		</section><!-- /footer-content -->
	</footer><!-- /footer -->

	<script>
	(function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
			(i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
			m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
		})(window,document,'script','//www.google-analytics.com/analytics.js','ga');
	ga('create', 'UA-43082725-1', 'ajclarkson.co.uk');
	ga('send', 'pageview');
	</script>
	</body>
</html>
