<html>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
		<title>{% if page.title %} {{page.title}} | {% endif %}{{site.name }}</title>
		<meta name="viewport" content="width=device-width">
		{% stylesheet site %}

		<script src="//use.typekit.net/ahk4squ.js"></script>
		<script>try{Typekit.load();}catch(e){}</script>
	</head>
	<body>
	<header id="site_header">
		<section class="wrap">
			<div id="identity"><a href="/">Adam<strong>Clarkson</strong></a></div>
			<nav id="site_nav">
				<li id="blog_tile"><a href="/blog/">Blog</a></li>
				<li id="projects_tile"><a href="/projects/">Projects</a></li>
				<li id="about_tile"><a href="/about/">About</a></li>
			</nav>
		</section><!-- /site-header-content -->
	</header><!-- /header -->
	<main class="wrap site_content" role="main">
		{{ content }}
	</main>
	<footer id="site_footer">
		<section id="footer_content" class="wrap">
			<p>Handcrafted by <a href="/about">Adam Clarkson</a>, powered by Jekyll &amp; Git. To keep updated you might want to <a href="http://twitter.com/ajclarkson">follow me on twitter</a> or <a href="/feed.xml">subscribe to my RSS</a>. &copy; 2013&mdash;{{ 'now' | date: "%Y" }}</p>
		</section><!-- /footer-content -->
	</footer><!-- /footer -->
	{% javascript app %}

	</body>
</html>
